<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · luogu-toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.06); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50 min-h-screen p-6 flex items-center justify-center">
    <div class="card max-w-2xl w-full p-8">
        <div class="text-center mb-6">
            <a href="/" class="text-sm text-slate-500 hover:text-indigo-600">← 返回首页</a>
            <h1 class="text-2xl font-extrabold text-slate-800 mt-2">🔐 洛谷登录</h1>
        </div>

        <!-- 模式 1: 密码登录 -->
        <div class="border-2 border-indigo-200 rounded-xl p-5 mb-6">
            <h2 class="text-lg font-bold text-indigo-800 mb-3">方式 A · 账号密码登录 (推荐)</h2>
            <p class="text-xs text-slate-500 mb-3">Playwright 自动识别图形验证码, 2FA 自动续接</p>
            <form id="pwdForm" class="space-y-3">
                <input name="username" type="text" required
                       placeholder="洛谷用户名 (UID 或 username)"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                <input name="password" type="password" required
                       placeholder="洛谷密码"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                <button type="submit"
                        class="w-full py-2.5 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700">
                    启动登录 →
                </button>
            </form>
        </div>

        <!-- 模式 2: 手动填 cookies -->
        <div id="manual" class="border-2 border-emerald-200 rounded-xl p-5">
            <h2 class="text-lg font-bold text-emerald-800 mb-3">方式 B · 手动填 cookies</h2>
            <p class="text-xs text-slate-500 mb-3">打开 <a href="https://www.luogu.com.cn" target="_blank" class="text-indigo-600 hover:underline">luogu.com.cn</a> → F12 → Application → Cookies → 复制三个值</p>
            <form id="cookieForm" class="space-y-3">
                <input name="client_id" type="text" required
                       placeholder="__client_id (从浏览器 cookie 复制)"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500">
                <input name="uid" type="text" required
                       placeholder="_uid (数字 UID)"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500">
                <input name="c3vk" type="text"
                       placeholder="C3VK (v3.9.60+ 可留空)"
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500">
                <button type="submit"
                        class="w-full py-2.5 bg-emerald-600 text-white font-bold rounded-lg hover:bg-emerald-700">
                    保存 cookies ✓
                </button>
            </form>
        </div>

        <div id="msg" class="mt-4 hidden"></div>
    </div>

    <script>
    // 模式 1: 密码登录
    document.getElementById('pwdForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const msg = document.getElementById('msg');
        msg.classList.remove('hidden');
        msg.innerHTML = '<div class="p-3 bg-indigo-50 text-indigo-700 rounded-lg">🚀 启动登录中...</div>';
        try {
            const r = await fetch('/api/login/start', { method: 'POST', body: fd });
            const d = await r.json();
            if (d.state === 'started' || d.state === 'need_2fa') {
                window.location.href = '/status/' + d.session_id;
            } else if (d.error) {
                msg.innerHTML = '<div class="p-3 bg-red-50 text-red-700 rounded-lg">❌ ' + d.error + '</div>';
            }
        } catch (err) {
            msg.innerHTML = '<div class="p-3 bg-red-50 text-red-700 rounded-lg">❌ ' + err.message + '</div>';
        }
    });

    // 模式 2: 保存 cookies → 自动 verify → 给跳转按钮
    document.getElementById('cookieForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const msg = document.getElementById('msg');
        msg.classList.remove('hidden');
        msg.innerHTML = '<div class="p-3 bg-emerald-50 text-emerald-700 rounded-lg">⏳ 保存 cookies...</div>';
        try {
            const r = await fetch('/api/cookie/save', { method: 'POST', body: fd });
            const d = await r.json();
            if (!d.ok) {
                msg.innerHTML = '<div class="p-3 bg-red-50 text-red-700 rounded-lg">❌ 保存失败: ' + (d.error || 'unknown') + '</div>';
                return;
            }
            // 保存成功 → 自动调 verify
            msg.innerHTML = '<div class="p-3 bg-emerald-50 text-emerald-700 rounded-lg">✅ 已保存 UID ' + d.uid + ' — 正在校验...</div>';
            let v;
            try {
                const vr = await fetch('/api/verify');
                v = await vr.json();
            } catch (err) {
                msg.innerHTML = '<div class="p-3 bg-red-50 text-red-700 rounded-lg">❌ 校验请求失败: ' + err.message + '</div>';
                return;
            }
            renderVerifyResult(v, msg);
            e.target.reset();
        } catch (err) {
            msg.innerHTML = '<div class="p-3 bg-red-50 text-red-700 rounded-lg">❌ ' + err.message + '</div>';
        }
    });

    // 渲染 verify 结果: 成功 / 失败 / pyLuogu 缺失 三种
    function renderVerifyResult(v, msg) {
        if (v.ok) {
            // 成功 → 跳转数据下载页
            msg.innerHTML =
                '<div class="p-4 bg-emerald-50 border border-emerald-200 rounded-lg">' +
                '  <div class="text-emerald-800 font-bold">✅ 校验通过 — UID ' + v.uid + ' (' + (v.username || '') + ')</div>' +
                '  <div class="text-sm text-emerald-700 mt-1">cookies 有效, 可以拉取你的数据了</div>' +
                '  <a href="/data" class="inline-block mt-3 px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">📥 去下载我的数据 →</a>' +
                '</div>';
        } else if (v.error === 'expired') {
            msg.innerHTML =
                '<div class="p-4 bg-red-50 border border-red-200 rounded-lg">' +
                '  <div class="text-red-800 font-bold">❌ cookies 已失效</div>' +
                '  <div class="text-sm text-red-700 mt-1">' + (v.message || '') + '</div>' +
                '  <div class="text-xs text-red-600 mt-2">解决: 重新打开 luogu.com.cn 登录, 然后再回来复制新的 cookies</div>' +
                '</div>';
        } else if (v.error === 'forbidden') {
            msg.innerHTML =
                '<div class="p-4 bg-amber-50 border border-amber-200 rounded-lg">' +
                '  <div class="text-amber-800 font-bold">⚠️ 触发风控</div>' +
                '  <div class="text-sm text-amber-700 mt-1">' + (v.message || '') + '</div>' +
                '  <div class="text-xs text-amber-600 mt-2">建议: 等几小时再用, 或换手动填</div>' +
                '</div>';
        } else if (v.error && v.error.includes('pyLuogu')) {
            // pyLuogu 未安装 — 但 cookies 本身已保存
            msg.innerHTML =
                '<div class="p-4 bg-amber-50 border border-amber-200 rounded-lg">' +
                '  <div class="text-amber-800 font-bold">⚠️ cookies 已保存, 但无法深度校验</div>' +
                '  <div class="text-sm text-amber-700 mt-1">pyLuogu 未安装在当前 Python 环境中:<br><code class="text-xs">' + (v.message || '').replace(/</g, '&lt;') + '</code></div>' +
                '  <div class="text-xs text-amber-600 mt-2">' +
                '    解决: <code>pip install luogu-toolkit[fetch]</code> 然后<strong>重启</strong> web 服务<br>' +
                '    或者直接 ' +
                '    <a href="/data" class="underline text-amber-800">去 /data</a> 试试, 公开端点 (用户资料 / AC 题) 仍可访问' +
                '  </div>' +
                '</div>';
        } else if (v.error === 'network') {
            msg.innerHTML =
                '<div class="p-4 bg-amber-50 border border-amber-200 rounded-lg">' +
                '  <div class="text-amber-800 font-bold">⚠️ 网络问题, 暂无法校验</div>' +
                '  <div class="text-sm text-amber-700 mt-1">' + (v.message || '') + '</div>' +
                '  <div class="text-xs text-amber-600 mt-2">cookies 本身已保存, 可以去 ' +
                '  <a href="/data" class="underline text-amber-800">/data 试试</a> (公开端点可能仍可用)</div>' +
                '</div>';
        } else {
            msg.innerHTML =
                '<div class="p-4 bg-slate-50 border border-slate-200 rounded-lg">' +
                '  <div class="text-slate-800 font-bold">⚠️ 未知状态</div>' +
                '  <pre class="text-xs text-slate-600 mt-1 whitespace-pre-wrap">' + JSON.stringify(v, null, 2) + '</pre>' +
                '</div>';
        }
    }
    </script>
</body>
</html>
